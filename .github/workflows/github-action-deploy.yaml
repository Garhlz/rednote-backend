name: Deploy To Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare production env file
        run: |
          test -n "${{ secrets.PROD_ENV_FILE }}"
          cat > deploy/prod.env <<'EOF'
          ${{ secrets.PROD_ENV_FILE }}
          EOF

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server host key
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Build platform-java image
        run: |
          docker build \
            --platform linux/amd64 \
            -t rednote/platform-java:latest \
            -f services/platform-java/Dockerfile \
            .
          docker save rednote/platform-java:latest | gzip > platform-java-image.tar.gz

      - name: Build sync-sidecar image
        run: |
          docker build \
            --platform linux/amd64 \
            -t rednote/sync-sidecar:latest \
            -f services/sync-sidecar/Dockerfile \
            services/sync-sidecar
          docker save rednote/sync-sidecar:latest | gzip > sync-sidecar-image.tar.gz

      - name: Sync project files
        run: |
          rsync -rlvz --delete --omit-dir-times --no-perms --no-owner --no-group \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.idea' \
            --exclude '.vscode' \
            --exclude '.codex' \
            --exclude '.cache' \
            --exclude '.tools' \
            --exclude 'logs' \
            --exclude 'uploads' \
            --exclude 'mongo_data' \
            --exclude 'pg_data' \
            --exclude 'redis_data' \
            --exclude 'grafana_data' \
            --exclude 'prometheus_data' \
            --exclude 'services/platform-java/.env' \
            --exclude 'services/platform-java/target' \
            --exclude 'services/platform-java/logs' \
            --exclude 'deploy/mongo-data.archive.gz' \
            --exclude 'deploy/postgres-data.sql' \
            . ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.REMOTE_PROJECT_PATH }}/

      - name: Sync image archives
        run: |
          rsync -avz platform-java-image.tar.gz sync-sidecar-image.tar.gz \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.REMOTE_PROJECT_PATH }}/

      - name: Deploy on remote server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "set -euo pipefail; \
            cd ${{ secrets.REMOTE_PROJECT_PATH }} && \
            docker load -i platform-java-image.tar.gz && \
            docker load -i sync-sidecar-image.tar.gz && \
            docker compose --env-file deploy/prod.env -f deploy/docker-compose.prod.yml up -d --build --remove-orphans && \
            rm -f platform-java-image.tar.gz sync-sidecar-image.tar.gz && \
            docker image prune -f"
