services:
  # ==========================================
  # 0. 微服务基础设施 (新增 Etcd)
  # ==========================================

  # Etcd: Go-Zero 的服务发现与配置中心
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    command:
      - /usr/local/bin/etcd
      - --name=s1
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd:2379  # 改成容器名
      - --listen-client-urls=http://0.0.0.0:2379            # 监听所有网卡
      - --initial-advertise-peer-urls=http://etcd:2380 # 修改
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=s1=http://etcd:2380     # 修改
      - --initial-cluster-state=new
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
    ports:
      - "127.0.0.1:2379:2379"
      - "127.0.0.1:2380:2380"
    networks:
      - dev-net

  # ==========================================
  # 1. 数据库
  # ==========================================

  db:
    image: mysql:8.0
    ports:
      - "0.0.0.0:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: user_db
      TZ: Asia/Shanghai
    volumes:
      - mysql_local_data:/var/lib/mysql
      # MySQL 同样支持挂载初始化脚本
      - ./scripts/init-users.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dev-net
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6.0
    ports:
      - "0.0.0.0:27017:27017"
    environment:
      MONGO_INITDB_DATABASE: rednote
      TZ: Asia/Shanghai
    volumes:
      - mongo_local_data:/data/db
#      - ~/Downloads/mongo_backup:/tmp/backup  # 临时映射
    networks:
      - dev-net

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "0.0.0.0:6379:6379"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_local_data:/data
    networks:
      - dev-net

  mq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      TZ: Asia/Shanghai
    volumes:
      - mq_local_data:/var/lib/rabbitmq
    networks:
      - dev-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 3. 搜索服务
  # ==========================================

  es:
    # Dockerfile.es 和插件 zip 包也移动到了 deploy/es/ 目录下
    build:
      context: .
      dockerfile: deploy/es/Dockerfile
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - TZ=Asia/Shanghai
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es_local_data:/usr/share/elasticsearch/data
    networks:
      - dev-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cat/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s


  # ==========================================
  # 4. 业务服务 (Go Sidecar & New Interaction Service)
  # ==========================================
  sync-sidecar:
    build:
      context: services/sync-sidecar
      dockerfile: Dockerfile.dev
      args:
        GOPROXY: https://goproxy.cn,direct
    environment:
      - ES_ADDRESS=http://es:9200
      - RABBITMQ_URL=amqp://admin:admin@mq:5672/
      - MONGO_URI=mongodb://mongo:27017
      - TZ=Asia/Shanghai
      - POST_AUDIT_ENABLE=false
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=es,localhost,127.0.0.1

    volumes:
      - ./services/sync-sidecar:/app
    depends_on:
      es:
        condition: service_healthy
      mq:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - dev-net

  interaction-rpc:
    build:
      context: services/interaction-rpc
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
#    container_name: interaction-rpc-dev
    ports:
      - "127.0.0.1:8081:8080" # 映射到宿主机 8081 (避免和 Java 的 8080 冲突，虽然 Java 也可以关掉)
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      etcd:
        condition: service_started
      redis:
        condition: service_started
      mq:
        condition: service_healthy
    networks:
      - dev-net

  search-rpc:
    build:
      context: services/search-rpc
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      - TZ=Asia/Shanghai
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=es,etcd,mongo,mq,localhost,127.0.0.1
    depends_on:
      etcd:
        condition: service_started
      redis:
        condition: service_started
      mq:
        condition: service_healthy
      es:
        condition: service_healthy
    networks:
      - dev-net

  user-rpc:
    build:
      context: services/user-rpc
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    ports:
      - "127.0.0.1:8083:8080"
    env_file:
      - services/user-rpc/.env
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      etcd:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dev-net

  gateway-api:
    build:
      context: .
      dockerfile: services/gateway-api/Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    ports:
      - "0.0.0.0:8090:8090"
    environment:
      - TZ=Asia/Shanghai
      - JAVA_API_BASE_URL=http://host.docker.internal:8080
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=host.docker.internal,localhost,127.0.0.1
      - http_proxy=
      - https_proxy=
      - no_proxy=host.docker.internal,localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      etcd:
        condition: service_started
      user-rpc:
        condition: service_started
      interaction-rpc:
        condition: service_started
      search-rpc:
        condition: service_started
    networks:
      - dev-net

volumes:
  mysql_local_data:
  mongo_local_data:
  redis_local_data:
  mq_local_data:
  es_local_data:


networks:
  dev-net:
    driver: bridge
