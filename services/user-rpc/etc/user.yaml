Name: user.rpc
ListenOn: 0.0.0.0:8080
Etcd:
  Hosts:
  - etcd:2379
  Key: user.rpc
Metrics:
  Host: 0.0.0.0
  Port: 40091
  Path: /metrics
Mysql:
  DataSource: root:123456@tcp(db:3306)/user_db?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai
BizRedis:
  Host: redis:6379
  Type: node
  Pass: ""
RabbitMQ:
  Enabled: "true"
  Url: amqp://admin:admin@mq:5672/
  Exchange: platform.topic.exchange
  UserUpdateRoutingKey: user.update
  UserDeleteRoutingKey: user.delete
Mail:
  Host: ${MAIL_HOST}
  Port: 465
  User: ${MAIL_USERNAME}
  Pass: ${MAIL_PASSWORD}
  From: ${MAIL_FROM}
  UseSSL: true
Jwt:
  Secret: ${JWT_SECRET}
  AccessExpireSeconds: 604800
  RefreshExpireSeconds: 2592000
  Issuer: ${JWT_ISSUER}
User:
  DefaultAvatar: ${USER_DEFAULT_AVATAR}
