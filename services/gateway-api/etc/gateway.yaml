Name: gateway-api
Host: 0.0.0.0
Port: 8090
Timeout: 60000

UserRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: user.rpc

SearchRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: search.rpc

InteractionRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: interaction.rpc

NotificationRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: notification.rpc

CommentRpc:
  Etcd:
    Hosts:
      - etcd:2379
    Key: comment.rpc

Redis:
  Host: redis:6379
  Pass: ""
  Type: node

Metrics:
  Host: 0.0.0.0
  Port: 40090
  Path: /metrics

JavaApi:
  BaseUrl: ${JAVA_API_BASE_URL:http://host.docker.internal:8080}
  TimeoutMs: 30000
Jwt:
  Secret: defaultSecretForDevOnly123456
  CheckTokenVersion: true
  IgnorePatterns:
    - /api/auth/*
    - /api/post/list
    - /api/post/search
    - /api/post/search/suggest
    - /api/tag/hot
    - /api/comment/list
    - /api/comment/sub-list
    - /api/user/*/profile
