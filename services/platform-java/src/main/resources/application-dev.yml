spring:
  # --- 1. 数据库与中间件连接 (Dev 环境专属 IP 和密码) ---
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/user_db?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 30 # 开发环境给个 30 够用了
      connection-timeout: 30000
      minimum-idle: 10

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/rednote}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:}

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    socket-timeout: 30s
    connection-timeout: 5s

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2.0
          max-interval: 10000ms
        default-requeue-rejected: false

  mail:
    host: ${MAIL_HOST}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    protocol: smtp
    properties:
      mail:
        debug: true # 开发环境开启邮件 debug
        smtp:
          auth: true
          ssl:
            enable: true
            trust: "*"
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory

  output:
    ansi:
      enabled: ALWAYS

# --- 2. 外部 API 密钥 (依赖本地环境变量或 .env) ---
aliyun:
  oss:
    enable: true
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-shenzhen.aliyuncs.com}
    access-key-id: ${ALIYUN_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
    bucket-name: ${ALIYUN_BUCKET_NAME}

wechat:
  appid: ${WECHAT_APPID}
  secret: ${WECHAT_SECRET}

tencent:
  im:
    sdk-appid: ${TENCENT_IM_SDK_APPID}
    secret-key: ${TENCENT_IM_SECRET_KEY}
    expire-time: 604800

ai:
  deepseek:
    url: https://api.deepseek.com/chat/completions
    key: ${DEEPSEEK_API_KEY}
    model: deepseek-chat
  dashscope:
    api-key: ${QWENVL_API_KEY}
    model: qwen-vl-plus
  bot:
    user-id: ${CHATBOT_ID}
    user-nickname: ${CHATBOT_NICKNAME}

szu:
  jwt:
    secret: ${JWT_SECRET:defaultSecretForDevOnly123456}

app:
  post:
    audit-enable: ${POST_AUDIT_ENABLE:false}

file:
  upload:
    path: ./uploads/
    base-url: ${FILE_BASE_URL:http://localhost:8080/uploads/}

# --- 3. 开发环境专属日志与调试 ---
mybatis-plus:
  configuration:
    # 仅在开发环境开启 SQL 控制台打印
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: INFO
    com.szu.afternoon3.platform.listener: DEBUG
    com.szu.afternoon3.platform.mapper: INFO
    org.springframework.data.mongodb.core.MongoTemplate: INFO
    org.mongodb.driver.protocol.command: WARN

# --- 4. 微服务本地联调地址 ---
grpc:
  client:
    interaction-service:
      address: 'static://127.0.0.1:8081'
      negotiation-type: plaintext
    search-service:
      address: 'static://127.0.0.1:8082'
      negotiation-type: plaintext
    user-service:
      address: 'static://127.0.0.1:8083'
      negotiation-type: plaintext
    notification-service:
      address: 'static://127.0.0.1:8084'
      negotiation-type: plaintext
    comment-service:
      address: 'static://127.0.0.1:8085'
      negotiation-type: plaintext
