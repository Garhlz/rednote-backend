services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    command:
      - /usr/local/bin/etcd
      - --name=s1
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=s1=http://etcd:2380
      - --initial-cluster-state=new
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
    restart: unless-stopped
    volumes:
      - etcd_data:/etcd-data
    networks:
      - prod-net

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-user_db}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
      - ../scripts/init-users.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - prod-net

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - prod-net

  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - prod-net

  mq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      TZ: Asia/Shanghai
    restart: unless-stopped
    volumes:
      - mq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - prod-net

  es:
    build:
      context: ..
      dockerfile: deploy/es/Dockerfile
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: Asia/Shanghai
    restart: unless-stopped
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cat/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - prod-net

  platform-java:
    image: rednote/platform-java:latest
    env_file:
      - ./prod.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
    restart: unless-stopped
    volumes:
      - java_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      mq:
        condition: service_healthy
      es:
        condition: service_healthy
      etcd:
        condition: service_started
    networks:
      - prod-net

  sync-sidecar:
    image: rednote/sync-sidecar:latest
    env_file:
      - ./prod.env
    environment:
      TZ: Asia/Shanghai
      ES_ADDRESS: ${ELASTICSEARCH_ADDRESS:-http://es:9200}
      RABBITMQ_URL: ${RABBITMQ_URL}
      MONGO_URI: ${MONGO_URI}
      ADMIN_HOST: 0.0.0.0
      ADMIN_PORT: 8088
    restart: unless-stopped
    depends_on:
      mq:
        condition: service_healthy
      mongo:
        condition: service_started
      es:
        condition: service_healthy
    networks:
      - prod-net

  user-rpc:
    build:
      context: ../services/user-rpc
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    env_file:
      - ./prod.env
    environment:
      TZ: Asia/Shanghai
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mq:
        condition: service_healthy
    networks:
      - prod-net

  interaction-rpc:
    build:
      context: ../services/interaction-rpc
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    env_file:
      - ./prod.env
    environment:
      TZ: Asia/Shanghai
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_started
      redis:
        condition: service_started
      mq:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - prod-net

  search-rpc:
    build:
      context: ../services/search-rpc
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    env_file:
      - ./prod.env
    environment:
      TZ: Asia/Shanghai
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_started
      es:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      mq:
        condition: service_healthy
    networks:
      - prod-net

  notification-rpc:
    build:
      context: ../services/notification-rpc
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    env_file:
      - ./prod.env
    environment:
      TZ: Asia/Shanghai
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_started
      mongo:
        condition: service_started
    networks:
      - prod-net

  comment-rpc:
    build:
      context: ../services/comment-rpc
      dockerfile: Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    env_file:
      - ./prod.env
    environment:
      TZ: Asia/Shanghai
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_started
      mongo:
        condition: service_started
      mq:
        condition: service_healthy
    networks:
      - prod-net

  gateway-api:
    build:
      context: ..
      dockerfile: services/gateway-api/Dockerfile
      args:
        GOPROXY: https://goproxy.cn,direct
    env_file:
      - ./prod.env
    environment:
      TZ: Asia/Shanghai
      JAVA_API_BASE_URL: ${JAVA_API_BASE_URL:-http://platform-java:8080}
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_started
      user-rpc:
        condition: service_started
      interaction-rpc:
        condition: service_started
      search-rpc:
        condition: service_started
      notification-rpc:
        condition: service_started
      comment-rpc:
        condition: service_started
      platform-java:
        condition: service_started
    networks:
      - prod-net

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      gateway-api:
        condition: service_started
      platform-java:
        condition: service_started
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - prod-net

volumes:
  etcd_data:
  mysql_data:
  mongo_data:
  redis_data:
  mq_data:
  es_data:
  java_uploads:

networks:
  prod-net:
    driver: bridge
