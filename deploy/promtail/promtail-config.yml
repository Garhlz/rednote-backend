server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{compose_service=~"gateway-api|user-rpc|interaction-rpc|search-rpc|comment-rpc|notification-rpc"}'
          stages:
            - json:
                expressions:
                  level: level
                  trace: trace
                  traceId: traceId
                  requestId: requestId
                  span: span
                  routingKey: routingKey
            - labels:
                level:
                trace:
                traceId:
                requestId:
                span:
                routingKey:
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        target_label: container
        regex: '/(.*)'
        replacement: '$1'
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream

  - job_name: platform-java-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: platform-java
          service: platform-java
          __path__: /var/log/platform-java/*.log

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}) \[(?P<thread>[^\]]+)\] service=(?P<service>[^\s]*) traceId=(?P<traceId>[^\s]*) requestId=(?P<requestId>[^\s]*) routingKey=(?P<routingKey>[^\s]*) (?P<level>[A-Z]+)\s+(?P<logger>[^-]+) - (?P<message>.*)$'
      - labels:
          level:
          service:
          traceId:
          requestId:
          routingKey:
      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05.000'
